services:
  # 用户服务
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gaokao-user-service
    ports:
      - "8080:8080"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=gaokao_user
      - DB_PASSWORD=gaokao_password
      - DB_NAME=gaokao_user_db
      - DB_SSLMODE=disable
      - DB_TIMEZONE=Asia/Shanghai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - JWT_EXPIRES_IN=24h
      - JWT_REFRESH_EXPIRES_IN=168h
      - SWAGGER_ENABLED=true
      - SWAGGER_HOST=localhost:8080
      - SWAGGER_BASE_PATH=/api/v1
      - BCRYPT_COST=12
      - MAX_LOGIN_ATTEMPTS=5
      - LOCKOUT_DURATION=15m
      - AUDIT_ENABLED=true
      - AUDIT_RETENTION_DAYS=90
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
      - CORS_ALLOWED_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - CORS_ALLOWED_HEADERS=Origin,Content-Type,Accept,Authorization,X-Requested-With
      - CORS_ALLOW_CREDENTIALS=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gaokao-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: gaokao-user-postgres
    environment:
      - POSTGRES_USER=gaokao_user
      - POSTGRES_PASSWORD=gaokao_password
      - POSTGRES_DB=gaokao_user_db
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 旧 ./init.sql 已删除：schema/seed 由 user-service 启动时 goose 应用 internal/database/migrations/*.sql
    networks:
      - gaokao-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaokao_user -d gaokao_user_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: gaokao-user-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gaokao-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # 数据库管理工具 (可选)
  adminer:
    image: adminer:latest
    container_name: gaokao-user-adminer
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - gaokao-network
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  gaokao-network:
    driver: bridge
    name: gaokao-network
