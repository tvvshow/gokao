name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 代码质量检查
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: true
    
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    
    - name: Cache Node modules
      uses: actions/cache@v5
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
    
    # 验证Swagger文档是否最新
    - name: Verify Swagger docs up-to-date
      env:
        GOPROXY: https://proxy.golang.org,https://goproxy.cn,direct
      run: |
        cd services/api-gateway
        go run github.com/swaggo/swag/cmd/swag@v1.8.12 init -g main.go -o docs --parseDependency --parseInternal
        # 仅校验 docs/ 是否与 commit 一致；go 工具链跨版本运行 `go run` 时可能写
        # toolchain 指令进 go.mod（go.work 与 module 的 go directive 版本错位），
        # 那不应误判为 swag 文档过期。
        if [ -n "$(git status --porcelain docs/)" ]; then
          echo "Swagger docs are out-of-date. Please run 'go run github.com/swaggo/swag/cmd/swag@v1.8.12 init -g main.go -o docs --parseDependency --parseInternal' and commit the changes."
          git diff -- docs/ | sed -n '1,200p'
          exit 1
        fi
    
    # API Gateway构建和测试
    - name: Build and Test (api-gateway)
      env:
        GOPROXY: https://proxy.golang.org,https://goproxy.cn,direct
      run: |
        cd services/api-gateway
        go mod tidy
        go build ./...
        go test ./... -coverprofile=coverage.out
        # Coverage gate: fail if below 60%
        total=$(go tool cover -func=coverage.out | awk '/total:/ {print substr($3, 1, length($3)-1)}')
        echo "Total coverage: ${total}%"
        awk -v t="$total" 'BEGIN{ if (t+0 < 60) { print "Coverage below 60%"; exit 1 } }'
    
    # Go代码检查
    # CI-DEBT-01 RESOLVED (2026-05-12):
    #   - golangci-lint-action@v6 拉 latest 但 binary 仍是 v1.64.8（go1.24 构建），
    #     无法 typecheck go1.25 stdlib，整条 lint job typecheck 阶段 fail。
    #   - 升 @v7 + version: v2.x 后，binary 是 v2.12.x（go1.25.7 构建），typecheck 通过。
    #   - 配套 .golangci.yml 已迁移 v2 schema（linters-settings → linters.settings、
    #     formatters 分离、gofmt/goimports 移入 formatters、gosimple/stylecheck/typecheck
    #     合并入 staticcheck/govet）。
    #   - 历史 lint 债（dupl/funlen/gocyclo/goconst/gocritic/lll/mnd 等纯 style noise
    #     总计 80+ 处）暂未启用 linter，分批引入由后续独立 commit 处理。
    - name: Lint (golangci-lint)
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.12.2
        working-directory: services/api-gateway
        args: --timeout=5m
    
    # 上传覆盖率报告
    - name: Upload coverage (artifact)
      uses: actions/upload-artifact@v7
      with:
        name: go-coverage
        path: services/api-gateway/coverage.out
        if-no-files-found: ignore
    
    # 生产环境保护：确保生产构建禁用Swagger
    - name: Production Guard - Verify prod compose disables Swagger
      if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
      run: |
        test -f docker-compose.prod.yml
        if ! grep -q "ENABLE_SWAGGER=0" docker-compose.prod.yml; then
          echo "Expected ENABLE_SWAGGER=0 in docker-compose.prod.yml for production."; exit 1; fi
    
    - name: Production Guard - Verify main.go has startup warning
      if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
      run: |
        if ! grep -q "Swagger UI is enabled in release mode" services/api-gateway/main.go; then
          echo "Expected startup warning for Swagger in release mode in main.go"; exit 1; fi
    
    - name: Go Vet
      run: go vet ./...
    
    - name: Go Security Check
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
        gosec ./...
    
    - name: Frontend Lint
      run: |
        cd frontend
        npm ci
        npm run lint
    
    - name: TypeScript Check
      run: |
        cd frontend
        npm run type-check

  # 单元测试
  unit-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gaokao_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        # setup-go@v5 默认 cache: true，自动管理 ~/go/pkg/mod 与 ~/.cache/go-build
        # 不要再叠加 actions/cache，否则 tar 解到已存在文件 → "Cannot open: File exists"

    - name: Run Go Tests
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/gaokao_test?sslmode=disable
        REDIS_URL: redis://localhost:6379
      run: |
        go test -v -race -coverprofile=coverage.out ./...
        go tool cover -html=coverage.out -o coverage.html
    
    - name: Upload Coverage Reports
      if: ${{ env.CODECOV_TOKEN != '' }}
      uses: codecov/codecov-action@v6
      with:
        token: ${{ env.CODECOV_TOKEN }}
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella
    
    - name: Frontend Tests
      run: |
        cd frontend
        npm ci
        npm run test:unit

  # C++模块构建
  cpp-build:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push'
    
    strategy:
      matrix:
        module: [device-fingerprint, license, volunteer-matcher]
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Install C++ Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libssl-dev libjsoncpp-dev pkg-config
    
    - name: Cache CMake builds
      uses: actions/cache@v5
      with:
        path: |
          cpp-modules/${{ matrix.module }}/build
          ~/.cache/cmake
        key: ${{ runner.os }}-cmake-${{ matrix.module }}-${{ hashFiles('cpp-modules/${{ matrix.module }}/CMakeLists.txt', 'cpp-modules/${{ matrix.module }}/src/**') }}
        restore-keys: |
          ${{ runner.os }}-cmake-${{ matrix.module }}-
    
    - name: Build C++ Module
      run: |
        cd cpp-modules/${{ matrix.module }}
        mkdir -p build
        cd build
        cmake .. -DBUILD_TESTING=OFF -DBUILD_TESTS=OFF -DBUILD_EXAMPLES=OFF -DBUILD_BENCHMARKS=OFF
        make -j$(nproc)
    
    - name: Run C++ Tests
      run: |
        cd cpp-modules/${{ matrix.module }}/build
        # 运行CTest测试套件
        if [ -f "CTestTestfile.cmake" ]; then
          ctest --output-on-failure --verbose
        fi
        # 直接运行测试可执行文件（备用方案）
        if [ -f "device_fingerprint_tests" ]; then
          ./device_fingerprint_tests
        fi
        if [ -f "${{ matrix.module }}_tests" ]; then
          ./${{ matrix.module }}_tests
        fi
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: cpp-${{ matrix.module }}-artifacts
        path: |
          cpp-modules/${{ matrix.module }}/build/lib*
          cpp-modules/${{ matrix.module }}/build/*_example
          cpp-modules/${{ matrix.module }}/build/*.so
          cpp-modules/${{ matrix.module }}/build/*.a
        retention-days: 7

  # 构建镜像
  build:
    runs-on: ubuntu-latest
    needs: [unit-tests, cpp-build]
    if: github.event_name == 'push'
    
    strategy:
      matrix:
        service: [api-gateway, user-service, data-service, payment-service, recommendation-service]
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Log in to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ${{ format('./services/{0}/Dockerfile', matrix.service) }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 构建前端
  build-frontend:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    
    - name: Cache Node modules
      uses: actions/cache@v5
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
    
    - name: Build Frontend
      run: |
        cd frontend
        npm ci
        npm run build
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Log in to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Frontend image
      uses: docker/build-push-action@v7
      with:
        context: ./frontend
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 安全扫描
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:latest
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'

  # 部署到预发布环境
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build, build-frontend]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v5
      with:
        version: 'v1.28.0'
    
    - name: Configure kubectl
      if: ${{ hashFiles('k8s/staging/kustomization.yaml') != '' }}
      run: |
        if [ -z "${{ secrets.KUBE_CONFIG_STAGING }}" ]; then
          echo "KUBE_CONFIG_STAGING is empty, skipping staging deploy setup."
          exit 0
        fi
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Deploy to Staging
      if: ${{ hashFiles('k8s/staging/kustomization.yaml') != '' }}
      run: |
        if [ ! -f kubeconfig ]; then
          echo "kubeconfig not present, skipping staging deployment."
          exit 0
        fi
        export KUBECONFIG=kubeconfig
        envsubst < k8s/staging/kustomization.yaml | kubectl apply -k -
        kubectl rollout status deployment/api-gateway -n gaokao-staging
        kubectl rollout status deployment/frontend -n gaokao-staging

  # 部署到生产环境
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, build-frontend, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v5
      with:
        version: 'v1.28.0'
    
    - name: Configure kubectl
      if: ${{ hashFiles('k8s/production/kustomization.yaml') != '' }}
      run: |
        if [ -z "${{ secrets.KUBE_CONFIG_PRODUCTION }}" ]; then
          echo "KUBE_CONFIG_PRODUCTION is empty, skipping production deploy setup."
          exit 0
        fi
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Blue-Green Deployment
      if: ${{ hashFiles('k8s/production/kustomization.yaml') != '' }}
      run: |
        if [ ! -f kubeconfig ]; then
          echo "kubeconfig not present, skipping production deployment."
          exit 0
        fi
        export KUBECONFIG=kubeconfig
        
        # 创建新版本部署
        envsubst < k8s/production/kustomization.yaml | kubectl apply -k -
        
        # 等待新版本就绪
        kubectl rollout status deployment/api-gateway-green -n gaokao-production
        kubectl rollout status deployment/frontend-green -n gaokao-production
        
        # 健康检查
        kubectl wait --for=condition=ready pod -l app=api-gateway,version=green -n gaokao-production --timeout=300s
        
        # 切换流量
        kubectl patch service api-gateway -n gaokao-production -p '{"spec":{"selector":{"version":"green"}}}'
        kubectl patch service frontend -n gaokao-production -p '{"spec":{"selector":{"version":"green"}}}'
        
        # 清理旧版本
        kubectl delete deployment api-gateway-blue frontend-blue -n gaokao-production --ignore-not-found=true

  # 集成测试
  integration-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    
    - name: Run Integration Tests
      run: |
        cd tests/integration
        npm ci
        npm run test
      env:
        API_BASE_URL: ${{ secrets.STAGING_API_URL }}
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

  # 性能测试
  performance-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Run K6 Performance Tests
      uses: grafana/k6-action@v0.3.1
      with:
        filename: tests/performance/load-test.js
      env:
        API_BASE_URL: ${{ secrets.STAGING_API_URL }}

  # 通知
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-production, integration-tests, performance-tests]
    if: always()
    
    steps:
    - name: Notify Success
      if: ${{ needs.deploy-production.result == 'success' }}
      run: |
        if [ -z "${{ secrets.WEBHOOK_URL }}" ]; then
          echo "WEBHOOK_URL is empty, skipping success notification."
          exit 0
        fi
        curl -X POST ${{ secrets.WEBHOOK_URL }} \
          -H 'Content-Type: application/json' \
          -d '{
            "text": "🎉 高考志愿填报系统部署成功！",
            "attachments": [{
              "color": "good",
              "fields": [{
                "title": "分支",
                "value": "${{ github.ref_name }}",
                "short": true
              }, {
                "title": "提交",
                "value": "${{ github.sha }}",
                "short": true
              }]
            }]
          }'
    
    - name: Notify Failure
      if: ${{ needs.deploy-production.result == 'failure' }}
      run: |
        if [ -z "${{ secrets.WEBHOOK_URL }}" ]; then
          echo "WEBHOOK_URL is empty, skipping failure notification."
          exit 0
        fi
        curl -X POST ${{ secrets.WEBHOOK_URL }} \
          -H 'Content-Type: application/json' \
          -d '{
            "text": "❌ 高考志愿填报系统部署失败！",
            "attachments": [{
              "color": "danger",
              "fields": [{
                "title": "分支",
                "value": "${{ github.ref_name }}",
                "short": true
              }, {
                "title": "提交",
                "value": "${{ github.sha }}",
                "short": true
              }]
            }]
          }'
