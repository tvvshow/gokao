version: "2"
run:
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  default: none
  enable:
    # Bug-finders / correctness (强制 fail)
    - bodyclose
    - errcheck
    - exhaustive
    - gosec
    - govet
    - ineffassign
    - noctx
    - revive
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    # Style 守门人（成本极低，价值清晰）
    - dogsled
    - gochecknoinits
    - goprintffuncname
    - misspell
    - nakedret
    - nolintlint
    - whitespace
    # 注：以下纯样式/噪音 linter 暂不开启，避免单次 CI 修复爆炸：
    #   dupl funlen gocyclo gocognit goconst gocritic lll mnd
    # depguard 暂不启用：v2 默认 deny-all 策略，需要项目级 allowlist 才有意义，单独 commit 推进。
    # 后续 lint 债务清理时再分批引入，每个 enable 独立 commit。
  settings:
    dupl:
      threshold: 100
    errcheck:
      # check-type-assertions / check-blank 在 v1 时启用但导致 Gin context `c.Get()`
      # 等惯用 type assertion 大面积告警；属 style 偏好不是 bug 探测器，关掉。
      check-type-assertions: false
      check-blank: false
    exhaustive:
      default-signifies-exhaustive: false
    funlen:
      lines: 100
      statements: 50
    gocognit:
      min-complexity: 15
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    godot:
      scope: declarations
      capital: false
    govet:
      enable:
        - shadow
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
    lll:
      line-length: 140
    misspell:
      locale: US
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - errcheck
          - funlen
          - gocyclo
          - gosec
          - mnd
          - noctx
        path: _test\.go
      - linters:
          - mnd
        path: cmd/
      - linters:
          - lll
        source: '^//go:generate '
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
severity:
  default: error
  rules:
    - linters:
        - dupl
      severity: info
    - linters:
        - misspell
      severity: warning
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/tvvshow/gokao
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
