# 高考志愿填报系统 - Prometheus 监控配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - 'alerts/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'prometheus:9090'

  - job_name: 'gaokao-http-metrics'
    scrape_interval: 10s
    static_configs:
      - targets:
          - 'api-gateway:8080'
          - 'monitoring-service:8086'
    metrics_path: '/metrics'

  - job_name: 'gaokao-health'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ['http://api-gateway:8080/health']
        labels:
          service: api-gateway
      - targets: ['http://user-service:8083/health']
        labels:
          service: user-service
      - targets: ['http://data-service:8082/health']
        labels:
          service: data-service
      - targets: ['http://recommendation-service:8084/health']
        labels:
          service: recommendation-service
      - targets: ['http://payment-service:8085/health']
        labels:
          service: payment-service
      - targets: ['http://monitoring-service:8086/metrics']
        labels:
          service: monitoring-service
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
