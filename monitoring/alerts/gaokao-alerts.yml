# 高考志愿填报系统 - Prometheus 告警规则
groups:
  - name: service-availability
    rules:
      - alert: ServiceHealthCheckFailed
        expr: probe_success{job="gaokao-health"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} 健康检查失败"
          description: "{{ $labels.service }} 连续 2 分钟未通过健康检查，当前目标为 {{ $labels.instance }}"
          action: "检查对应容器状态、服务日志与依赖连接"

  - name: gateway-performance
    rules:
      - alert: APIGatewayHighErrorRate
        expr: |
          sum(rate(gaokao_http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(gaokao_http_requests_total[5m])), 1)
          > 0.05
        for: 5m
        labels:
          severity: warning
          service: api-gateway
        annotations:
          summary: "API Gateway 5xx 错误率过高"
          description: "API Gateway 在最近 5 分钟内 5xx 错误率超过 5%"
          action: "检查网关日志、下游依赖与限流/代理配置"

      - alert: APIGatewayHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(gaokao_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
          service: api-gateway
        annotations:
          summary: "API Gateway P95 延迟过高"
          description: "API Gateway 最近 5 分钟 P95 延迟超过 1 秒"
          action: "检查热点路径、缓存命中率和下游服务响应时间"

  - name: monitoring-pipeline
    rules:
      - alert: MonitoringTargetDown
        expr: up{job=~"prometheus|gaokao-http-metrics"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "监控目标不可抓取"
          description: "Prometheus 无法抓取 {{ $labels.instance }}（job={{ $labels.job }}）超过 2 分钟"
          action: "检查监控容器状态、网络连通性与抓取路径"
