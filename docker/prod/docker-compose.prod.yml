version: "3.9"

# 生产环境 Docker Compose 配置
# 优化性能、安全性和监控

services:
  # PostgreSQL 数据库 - 生产配置
  postgres:
    image: postgres:14-alpine
    container_name: gaokao-postgres-prod
    environment:
      POSTGRES_DB: gaokao_prod
      POSTGRES_USER: gaokao_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=zh_CN.UTF-8"
    ports:
      - "127.0.0.1:5432:5432"  # 只绑定本地访问
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./prod/sql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - gaokao-prod-backend
    secrets:
      - postgres_password
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaokao_user -d gaokao_prod"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis 缓存 - 生产配置
  redis:
    image: redis:7.0-alpine
    container_name: gaokao-redis-prod
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"  # 只绑定本地访问
    volumes:
      - redis_prod_data:/data
      - ./prod/redis/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - gaokao-prod-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # C++ 模块服务 - 生产配置
  cpp-modules:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile.cpp-modules
    image: gaokao/cpp-modules:${VERSION:-latest}
    container_name: gaokao-cpp-modules-prod
    ports:
      - "127.0.0.1:8082:8082"  # 只绑定本地访问
    environment:
      - DEBUG=false
      - LOG_LEVEL=info
      - CPP_MODULE_PATH=/app
    networks:
      - gaokao-prod-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # User Service - 生产配置
  user-service:
    build:
      context: ../../services/user-service
      dockerfile: ../../docker/prod/Dockerfile.user-service
    image: gaokao/user-service:${VERSION:-latest}
    container_name: gaokao-user-service-prod
    ports:
      - "127.0.0.1:8081:8081"  # 只绑定本地访问
    environment:
      - PORT=8081
      - GIN_MODE=release
      - DEBUG=false
      - LOG_LEVEL=info
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=gaokao_user
      - DB_PASSWORD_FILE=/run/secrets/postgres_password
      - DB_NAME=gaokao_prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CPP_MODULE_HOST=cpp-modules
      - CPP_MODULE_PORT=8082
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cpp-modules:
        condition: service_started
    networks:
      - gaokao-prod-backend
    secrets:
      - postgres_password
      - jwt_secret
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # API Gateway - 生产配置
  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: ../../docker/prod/Dockerfile.api-gateway
    image: gaokao/api-gateway:${VERSION:-latest}
    container_name: gaokao-api-gateway-prod
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      - PORT=8080
      - GIN_MODE=release
      - ENABLE_SWAGGER=0
      - DEBUG=false
      - LOG_LEVEL=info
      - USER_SERVICE_URL=http://user-service:8081
      - CPP_MODULE_URL=http://cpp-modules:8082
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - TLS_CERT_FILE=/run/secrets/tls_cert
      - TLS_KEY_FILE=/run/secrets/tls_key
    depends_on:
      - user-service
      - redis
    networks:
      - gaokao-prod-frontend
      - gaokao-prod-backend
    secrets:
      - jwt_secret
      - tls_cert
      - tls_key
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx 反向代理 - 生产负载均衡
  nginx:
    image: nginx:1.24-alpine
    container_name: gaokao-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./prod/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./prod/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api-gateway
    networks:
      - gaokao-prod-frontend
    secrets:
      - tls_cert
      - tls_key
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.1"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # 监控服务 - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: gaokao-prometheus-prod
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prod/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_prod_data:/prometheus
    networks:
      - gaokao-prod-backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 512M
          cpus: "0.25"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 监控服务 - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: gaokao-grafana-prod
    environment:
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_admin_password
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./prod/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - gaokao-prod-backend
    secrets:
      - grafana_admin_password
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"
        reservations:
          memory: 256M
          cpus: "0.1"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# 网络配置
networks:
  gaokao-prod-frontend:
    driver: bridge
    name: gaokao-prod-frontend
  gaokao-prod-backend:
    driver: bridge
    name: gaokao-prod-backend
    internal: true  # 后端网络不允许外部访问

# 数据卷
volumes:
  postgres_prod_data:
    name: gaokao-postgres-prod-data
  redis_prod_data:
    name: gaokao-redis-prod-data
  prometheus_prod_data:
    name: gaokao-prometheus-prod-data
  grafana_prod_data:
    name: gaokao-grafana-prod-data
  nginx_logs:
    name: gaokao-nginx-logs

# 敏感信息管理
secrets:
  postgres_password:
    file: ./prod/secrets/postgres_password.txt
  redis_password:
    file: ./prod/secrets/redis_password.txt
  jwt_secret:
    file: ./prod/secrets/jwt_secret.txt
  grafana_admin_password:
    file: ./prod/secrets/grafana_admin_password.txt
  tls_cert:
    file: ./prod/secrets/tls.crt
  tls_key:
    file: ./prod/secrets/tls.key