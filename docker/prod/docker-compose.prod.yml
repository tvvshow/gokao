# Production Docker Compose for 高考志愿填报系统
#
# Run from repo root:
#   docker compose -f docker/prod/docker-compose.prod.yml --env-file docker/prod/.env up -d
#
# Prerequisites: docker/prod/SECRETS.md (TLS cert / passwords / JWT / AES keys)
#
# Service topology:
#   - gaokao-prod-frontend (external): nginx
#   - gaokao-prod-backend (internal): all microservices + postgres + redis + monitoring
#   - frontend container is reverse-proxied by nginx, not exposed directly.
#
# Path convention: this file lives at docker/prod/, so relative paths point one or two levels up.

version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart unless-stopped

x-service-healthcheck: &service-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

services:
  # ── Data plane ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gaokao-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gaokao_prod}
      POSTGRES_USER: ${POSTGRES_USER:-gaokao_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ../../scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - gaokao-prod-backend
    secrets:
      - postgres_password
    deploy:
      resources:
        limits: { memory: 2G, cpus: "1.0" }
        reservations: { memory: 1G, cpus: "0.5" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gaokao_user} -d ${POSTGRES_DB:-gaokao_prod}"]
      start_period: 60s
    restart: *default-restart
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: gaokao-redis-prod
    command: >
      sh -c 'redis-server
      --requirepass "$$(cat /run/secrets/redis_password)"
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru'
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - gaokao-prod-backend
    secrets:
      - redis_password
    deploy:
      resources:
        limits: { memory: 512M, cpus: "0.5" }
        reservations: { memory: 256M, cpus: "0.25" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "redis-cli --pass \"$$(cat /run/secrets/redis_password)\" ping | grep -q PONG"]
    restart: *default-restart
    logging: *default-logging

  # ── Microservices ───────────────────────────────────────────
  # cpp-modules is intentionally NOT a separate container: recommendation-service
  # links libvolunteer_matcher.so via CGO at build time (see services/recommendation-service/Dockerfile).
  data-service:
    build:
      context: ../../
      dockerfile: services/data-service/Dockerfile
    image: gaokao/data-service:${VERSION:-latest}
    container_name: gaokao-data-service-prod
    environment:
      - PORT=8082
      - GIN_MODE=release
      - ENABLE_SWAGGER=0
      - DATABASE_URL=postgres://${POSTGRES_USER:-gaokao_user}:$$(cat /run/secrets/postgres_password)@postgres:5432/${POSTGRES_DB:-gaokao_prod}?sslmode=disable
      - REDIS_URL=redis:6379
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - REDIS_DB=0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATA_IMPORT_ENABLED=${DATA_IMPORT_ENABLED:-false}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks:
      - gaokao-prod-backend
    secrets:
      - postgres_password
      - redis_password
    deploy:
      resources:
        limits: { memory: 1G, cpus: "1.0" }
        reservations: { memory: 512M, cpus: "0.5" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8082/health"]
    restart: *default-restart
    logging: *default-logging

  user-service:
    build:
      context: ../../
      dockerfile: services/user-service/Dockerfile
    image: gaokao/user-service:${VERSION:-latest}
    container_name: gaokao-user-service-prod
    environment:
      - PORT=8083
      - GIN_MODE=release
      - DEBUG=false
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATABASE_URL=postgres://${POSTGRES_USER:-gaokao_user}:$$(cat /run/secrets/postgres_password)@postgres:5432/${POSTGRES_DB:-gaokao_prod}?sslmode=disable
      - REDIS_URL=redis:6379
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - REDIS_DB=1
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - AES_ENCRYPTION_KEY_FILE=/run/secrets/aes_key
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks:
      - gaokao-prod-backend
    secrets:
      - postgres_password
      - redis_password
      - jwt_secret
      - aes_key
    deploy:
      resources:
        limits: { memory: 512M, cpus: "0.5" }
        reservations: { memory: 256M, cpus: "0.25" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8083/health"]
    restart: *default-restart
    logging: *default-logging

  recommendation-service:
    build:
      context: ../../
      dockerfile: services/recommendation-service/Dockerfile
    image: gaokao/recommendation-service:${VERSION:-latest}
    container_name: gaokao-recommendation-service-prod
    environment:
      - SERVER_PORT=8084
      - SERVER_MODE=release
      - DATA_SERVICE_URL=http://data-service:8082
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALGORITHM_TYPE=${ALGORITHM_TYPE:-hybrid}
      - LD_LIBRARY_PATH=/usr/local/lib
      - CPP_LIBRARY_PATH=/usr/local/lib/libvolunteer_matcher.so
      - LLM_ENABLED=${RECOMMENDATION_LLM_ENABLED:-false}
      - LLM_PROVIDER=${RECOMMENDATION_LLM_PROVIDER:-openai-compatible}
      - LLM_BASE_URL=${RECOMMENDATION_LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY_FILE=/run/secrets/llm_api_key
      - LLM_MODEL=${RECOMMENDATION_LLM_MODEL:-gpt-4o-mini}
      - LLM_TIMEOUT=${RECOMMENDATION_LLM_TIMEOUT:-20s}
      - LLM_MAX_TOKENS=${RECOMMENDATION_LLM_MAX_TOKENS:-800}
      - LLM_TEMPERATURE=${RECOMMENDATION_LLM_TEMPERATURE:-0.3}
      - LLM_FALLBACK_ENABLED=${RECOMMENDATION_LLM_FALLBACK_ENABLED:-true}
    depends_on:
      data-service: { condition: service_healthy }
    networks:
      - gaokao-prod-backend
    secrets:
      - llm_api_key
    deploy:
      resources:
        limits: { memory: 1G, cpus: "1.0" }
        reservations: { memory: 512M, cpus: "0.5" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8084/health"]
    restart: *default-restart
    logging: *default-logging

  payment-service:
    build:
      context: ../../
      dockerfile: services/payment-service/Dockerfile
    image: gaokao/payment-service:${VERSION:-latest}
    container_name: gaokao-payment-service-prod
    environment:
      - PORT=8085
      - GIN_MODE=release
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-gaokao_user}
      - DB_PASSWORD_FILE=/run/secrets/postgres_password
      - DB_NAME=${POSTGRES_DB:-gaokao_prod}
      - DB_SSL_MODE=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - REDIS_DB=2
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Payment adapter material is provided via mounted file paths.
      # See SECRETS.md; absence is tolerated by adapter factory until merchant onboarding.
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_PRIVATE_KEY_FILE=/run/secrets/alipay_private_key
      - ALIPAY_PUBLIC_KEY_FILE=/run/secrets/alipay_public_key
      - WECHAT_MCH_ID=${WECHAT_MCH_ID:-}
      - WECHAT_API_KEY_FILE=/run/secrets/wechat_api_key
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks:
      - gaokao-prod-backend
    secrets:
      - postgres_password
      - redis_password
      - jwt_secret
      - alipay_private_key
      - alipay_public_key
      - wechat_api_key
    deploy:
      resources:
        limits: { memory: 512M, cpus: "0.5" }
        reservations: { memory: 256M, cpus: "0.25" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8085/health"]
    restart: *default-restart
    logging: *default-logging

  monitoring-service:
    build:
      context: ../../
      dockerfile: services/monitoring-service/Dockerfile
    image: gaokao/monitoring-service:${VERSION:-latest}
    container_name: gaokao-monitoring-service-prod
    environment:
      - PORT=8086
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      redis: { condition: service_healthy }
    networks:
      - gaokao-prod-backend
    secrets:
      - redis_password
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.25" }
        reservations: { memory: 128M, cpus: "0.1" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8086/metrics"]
    restart: *default-restart
    logging: *default-logging

  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    image: gaokao/api-gateway:${VERSION:-latest}
    container_name: gaokao-api-gateway-prod
    environment:
      - PORT=8080
      - GIN_MODE=release
      - ENABLE_SWAGGER=0
      - DEBUG=false
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATA_SERVICE_URL=http://data-service:8082
      - USER_SERVICE_URL=http://user-service:8083
      - RECOMMENDATION_SERVICE_URL=http://recommendation-service:8084
      - PAYMENT_SERVICE_URL=http://payment-service:8085
      - MONITORING_SERVICE_URL=http://monitoring-service:8086
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_DURATION=${RATE_LIMIT_DURATION:-60}
    depends_on:
      data-service:           { condition: service_healthy }
      user-service:           { condition: service_healthy }
      recommendation-service: { condition: service_healthy }
      payment-service:        { condition: service_healthy }
      monitoring-service:     { condition: service_healthy }
    networks:
      - gaokao-prod-backend
    secrets:
      - redis_password
      - jwt_secret
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1.0" }
        reservations: { memory: 256M, cpus: "0.5" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8080/health"]
    restart: *default-restart
    logging: *default-logging

  # ── Edge / frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: gaokao/frontend:${VERSION:-latest}
    container_name: gaokao-frontend-prod
    networks:
      - gaokao-prod-frontend
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.25" }
        reservations: { memory: 128M, cpus: "0.1" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
    restart: *default-restart
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    container_name: gaokao-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
      # L-04: Let's Encrypt 共享卷。无 letsencrypt profile 时这两个卷为空目录，
      # nginx 仍走 /run/secrets/tls_{cert,key}；启用 LE 后 operator 改 ssl_certificate
      # 指向 /etc/letsencrypt/live/$DOMAIN/{fullchain,privkey}.pem（见 SECRETS.md §7）。
      - letsencrypt_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      api-gateway: { condition: service_healthy }
      frontend:    { condition: service_healthy }
    networks:
      - gaokao-prod-frontend
      - gaokao-prod-backend
    secrets:
      - tls_cert
      - tls_key
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.25" }
        reservations: { memory: 128M, cpus: "0.1" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz || exit 1"]
    restart: *default-restart
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Let's Encrypt（profile=letsencrypt 启用） ─────────────────
  # L-04 (2026-05-13)：opt-in TLS 自动签发 + 续期。
  #   - 默认部署不启动这两个容器，保持 docker secrets 现有 TLS 流不变。
  #   - 启用顺序：见 docker/prod/SECRETS.md §7。简言之：
  #     1) 首签：`docker compose --profile letsencrypt run --rm certbot certonly ...`
  #     2) 编辑 nginx.conf 把 ssl_certificate 指向 LE 路径，重启 nginx
  #     3) 常驻：`docker compose --profile letsencrypt up -d certbot-renewer`
  certbot:
    image: certbot/certbot:v2.11.0
    container_name: gaokao-certbot
    profiles: ["letsencrypt"]
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # 默认 entrypoint 是 `certbot`；本服务作为一次性命令载体（--rm + 显式参数）。
    # 用法示例：
    #   docker compose --profile letsencrypt run --rm certbot \
    #     certonly --webroot -w /var/www/certbot \
    #     -d ${DOMAIN_NAME} -m ${LETSENCRYPT_EMAIL} \
    #     --agree-tos --no-eff-email --non-interactive
    networks:
      - gaokao-prod-frontend

  certbot-renewer:
    image: certbot/certbot:v2.11.0
    container_name: gaokao-certbot-renewer
    profiles: ["letsencrypt"]
    # certbot 自身每 12h 检查一次；只在距过期 < 30 天才真续期。
    # --deploy-hook 在真续期成功时触发，通过 docker socket 给 nginx 发 SIGHUP（reload 不中断）。
    # docker-cli 用 apk 临时装；container 重启会重装（~10s 开销），换 dedicated 镜像更省。
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache docker-cli >/dev/null 2>&1 || true
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet \
            --deploy-hook "docker kill -s HUP gaokao-nginx-prod 2>/dev/null || true" || true
          sleep 12h
        done
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      # docker socket 用于 deploy-hook 给 nginx 发 SIGHUP。
      # 风险：renewer 容器 → 主机 docker daemon。LE profile 是 opt-in，运维选用。
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gaokao-prod-frontend
    deploy:
      resources:
        limits: { memory: 128M, cpus: "0.10" }
    restart: *default-restart
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Observability ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: gaokao-prometheus-prod
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS:-30}d'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_prod_data:/prometheus
    networks:
      - gaokao-prod-backend
    depends_on:
      - api-gateway
      - monitoring-service
    deploy:
      resources:
        limits: { memory: 1G, cpus: "0.5" }
        reservations: { memory: 512M, cpus: "0.25" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
    restart: *default-restart
    logging: *default-logging

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: gaokao-alertmanager-prod
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ../../monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_prod_data:/alertmanager
    networks:
      - gaokao-prod-backend
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.25" }
        reservations: { memory: 128M, cpus: "0.1" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9093/-/healthy"]
    restart: *default-restart
    logging: *default-logging

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: gaokao-blackbox-exporter-prod
    networks:
      - gaokao-prod-backend
    deploy:
      resources:
        limits: { memory: 128M, cpus: "0.1" }
        reservations: { memory: 64M, cpus: "0.05" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9115/-/healthy"]
    restart: *default-restart
    logging: *default-logging

  grafana:
    image: grafana/grafana:10.4.2
    container_name: gaokao-grafana-prod
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_prod_data:/var/lib/grafana
      # L-08: datasource provisioning。Grafana 启动时自动注册 Prometheus + Loki，
      # 避免运维每次重建容器手动加 datasource。
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - gaokao-prod-backend
    depends_on:
      - prometheus
      - loki
    secrets:
      - grafana_admin_password
    deploy:
      resources:
        limits: { memory: 512M, cpus: "0.25" }
        reservations: { memory: 256M, cpus: "0.1" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
    restart: *default-restart
    logging: *default-logging

  # ── 日志聚合 (L-08, 2026-05-13) ──────────────────────────────
  # Loki + Promtail 完成"应用容器 stdout → Promtail → Loki → Grafana LogQL"链路。
  # 默认无 auth（仅 backend internal 网络可达）。规模化后切 distributed + S3 后端。
  loki:
    image: grafana/loki:3.0.0
    container_name: gaokao-loki-prod
    command:
      - '-config.file=/etc/loki/loki.yml'
    volumes:
      - ../../monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki_prod_data:/loki
    networks:
      - gaokao-prod-backend
    deploy:
      resources:
        limits: { memory: 1G, cpus: "0.5" }
        reservations: { memory: 512M, cpus: "0.25" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3100/ready || exit 1"]
    restart: *default-restart
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: gaokao-promtail-prod
    command:
      - '-config.file=/etc/promtail/promtail.yml'
    volumes:
      - ../../monitoring/promtail.yml:/etc/promtail/promtail.yml:ro
      # docker socket 用于 docker_sd_configs 自动发现容器（只读）。
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # 容器日志路径，json-file driver 写入这里；promtail 直读文件而非走 docker logs API。
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail_prod_data:/tmp
    networks:
      - gaokao-prod-backend
    depends_on:
      - loki
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.25" }
        reservations: { memory: 128M, cpus: "0.1" }
    healthcheck:
      <<: *service-healthcheck
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9080/ready || exit 1"]
    restart: *default-restart
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  gaokao-prod-frontend:
    driver: bridge
    name: gaokao-prod-frontend
  gaokao-prod-backend:
    driver: bridge
    name: gaokao-prod-backend
    internal: true   # no egress to public internet; only via nginx in frontend network

volumes:
  postgres_prod_data:     { name: gaokao-postgres-prod-data }
  redis_prod_data:        { name: gaokao-redis-prod-data }
  prometheus_prod_data:   { name: gaokao-prometheus-prod-data }
  alertmanager_prod_data: { name: gaokao-alertmanager-prod-data }
  grafana_prod_data:      { name: gaokao-grafana-prod-data }
  nginx_logs:             { name: gaokao-nginx-prod-logs }
  # L-04 LE 共享卷。无 letsencrypt profile 时空目录，挂载零成本。
  letsencrypt_certs:      { name: gaokao-letsencrypt-certs }
  certbot_webroot:        { name: gaokao-certbot-webroot }
  # L-08 Loki + Promtail 持久化。
  loki_prod_data:         { name: gaokao-loki-prod-data }
  promtail_prod_data:     { name: gaokao-promtail-prod-data }

secrets:
  postgres_password:      { file: ./secrets/postgres_password.txt }
  redis_password:         { file: ./secrets/redis_password.txt }
  jwt_secret:             { file: ./secrets/jwt_secret.txt }
  aes_key:                { file: ./secrets/aes_key.txt }
  grafana_admin_password: { file: ./secrets/grafana_admin_password.txt }
  tls_cert:               { file: ./secrets/tls.crt }
  tls_key:                { file: ./secrets/tls.key }
  llm_api_key:            { file: ./secrets/llm_api_key.txt }
  alipay_private_key:     { file: ./secrets/alipay_private_key.pem }
  alipay_public_key:      { file: ./secrets/alipay_public_key.pem }
  wechat_api_key:         { file: ./secrets/wechat_api_key.txt }
