# Nginx 生产环境配置 — 单入口反向代理 (frontend + api-gateway)
#
# 上行：终结 SSL，挂载 /run/secrets/tls_cert + tls_key
# 下行：内网名解析 frontend:3000 / api-gateway:8080
# 限流：通用 API 10r/s，登录 1r/s（与 backend rateLimiter 互补）

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_time $upstream_response_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # 安全头（OWASP baseline）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 上游
    upstream api_gateway {
        server api-gateway:8080;
        keepalive 32;
    }

    upstream frontend_upstream {
        server frontend:3000;
        keepalive 16;
    }

    # 限流：通用 API / 登录 / 推荐分级
    limit_req_zone $binary_remote_addr zone=api:10m       rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m     rate=1r/s;
    limit_req_zone $binary_remote_addr zone=recommend:10m rate=2r/s;

    # 80 → 443 重定向
    server {
        listen 80;
        server_name _;
        location /healthz { return 200 "ok\n"; access_log off; }

        # L-04: Let's Encrypt HTTP-01 challenge 文件。certbot --webroot 把
        # /.well-known/acme-challenge/* 写到 certbot_webroot volume，本路径透传。
        # 与 letsencrypt profile 配套；不用 LE 时该 location 空读为 404，无副作用。
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            access_log off;
        }

        location /       { return 301 https://$host$request_uri; }
    }

    # HTTPS 主入口
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /run/secrets/tls_cert;
        ssl_certificate_key /run/secrets/tls_key;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        client_max_body_size 10M;
        client_body_timeout 60s;
        client_header_timeout 60s;

        # 登录接口特殊限流
        location = /api/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 推荐接口限流（贵）
        location /api/recommendations/ {
            limit_req zone=recommend burst=10 nodelay;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;   # recommendation < 500ms 目标 + 余量
        }

        # 通用 API
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # 健康检查（透传到 api-gateway/health）
        location = /health {
            proxy_pass http://api_gateway/health;
            access_log off;
        }

        # 前端：所有非 /api 路径反代到 frontend 容器（其内部 listen 3000）
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 屏蔽敏感路径
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        location ~ /README|/LICENSE|/CHANGELOG {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
