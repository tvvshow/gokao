services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: gaokao_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gaokao_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./scripts:/docker-entrypoint-initdb.d/scripts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped
    networks:
      - gaokao_network

  # Redis缓存 (默认无密码，需要密码时用 docker-compose.secure.yml 覆盖)
  redis:
    image: redis:7-alpine
    container_name: gaokao_redis
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - gaokao_network

  # 数据服务
  data-service:
    build:
      context: .
      dockerfile: ./services/data-service/Dockerfile
    image: gaokao/data-service:latest
    container_name: gaokao_data_service
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - GIN_MODE=release
      - ENABLE_SWAGGER=1
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-gaokao_db}?sslmode=disable
      - REDIS_URL=redis:6379
      - REDIS_DB=0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATA_IMPORT_ENABLED=${DATA_IMPORT_ENABLED:-true}
    volumes:
      - ./scripts:/app/scripts
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gaokao_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # API 网关
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    image: gaokao/api-gateway:latest
    container_name: gaokao_api_gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
      - ENABLE_SWAGGER=1
      - DATA_SERVICE_URL=http://data-service:8082
      - USER_SERVICE_URL=http://user-service:8083
      - RECOMMENDATION_SERVICE_URL=http://recommendation-service:8084
      - PAYMENT_SERVICE_URL=http://payment-service:8085
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-1000}
      - RATE_LIMIT_DURATION=${RATE_LIMIT_DURATION:-1}
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - data-service
    restart: unless-stopped
    networks:
      - gaokao_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # 用户服务
  user-service:
    build:
      context: .
      dockerfile: ./services/user-service/Dockerfile
    image: gaokao/user-service:latest
    container_name: gaokao_user_service
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - GIN_MODE=release
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-gaokao_db}?sslmode=disable
      - REDIS_URL=redis:6379
      - REDIS_DB=1
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - JWT_SECRET=${JWT_SECRET:-gaokao-dev-jwt-secret-min-32-chars-long}
      - AES_ENCRYPTION_KEY=${AES_ENCRYPTION_KEY:-gaokao-dev-aes-key-must-be-at-least-32ch}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gaokao_network

  # 推荐服务 (C++ built inside Docker, not host-mounted)
  recommendation-service:
    build:
      context: .
      dockerfile: ./services/recommendation-service/Dockerfile
    image: gaokao/recommendation-service:latest
    container_name: gaokao_recommendation_service
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
      - SERVER_MODE=release
      - DATA_SERVICE_URL=http://data-service:8082
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALGORITHM_TYPE=${ALGORITHM_TYPE:-hybrid}
      - LD_LIBRARY_PATH=/usr/local/lib
      - CPP_LIBRARY_PATH=/usr/local/lib/libvolunteer_matcher.so
      - LLM_ENABLED=${RECOMMENDATION_LLM_ENABLED:-false}
      - LLM_PROVIDER=${RECOMMENDATION_LLM_PROVIDER:-openai-compatible}
      - LLM_BASE_URL=${RECOMMENDATION_LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${RECOMMENDATION_LLM_API_KEY:-}
      - LLM_MODEL=${RECOMMENDATION_LLM_MODEL:-gpt-4o-mini}
      - LLM_TIMEOUT=${RECOMMENDATION_LLM_TIMEOUT:-20s}
      - LLM_MAX_TOKENS=${RECOMMENDATION_LLM_MAX_TOKENS:-800}
      - LLM_TEMPERATURE=${RECOMMENDATION_LLM_TEMPERATURE:-0.3}
      - LLM_FALLBACK_ENABLED=${RECOMMENDATION_LLM_FALLBACK_ENABLED:-true}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - data-service
    restart: unless-stopped
    networks:
      - gaokao_network

  # 支付服务
  payment-service:
    build:
      context: .
      dockerfile: ./services/payment-service/Dockerfile
    image: gaokao/payment-service:latest
    container_name: gaokao_payment_service
    # 端口仅在 docker network 内暴露，通过 api-gateway 访问
    # 如需宿主机直连，取消下面注释或用 docker-compose.override.yml 覆盖
    # ports:
    #   - "8085:8085"
    environment:
      - PORT=8085
      - GIN_MODE=release
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-password}
      - DB_NAME=${POSTGRES_DB:-gaokao_db}
      - DB_SSL_MODE=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=2
      - JWT_SECRET=${JWT_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gaokao_network

  # 监控服务
  monitoring-service:
    build:
      context: .
      dockerfile: ./services/monitoring-service/Dockerfile
    image: gaokao/monitoring-service:latest
    container_name: gaokao_monitoring_service
    ports:
      - "8086:8086"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gaokao_network

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: gaokao_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    depends_on:
      - api-gateway
      - monitoring-service
    restart: unless-stopped
    networks:
      - gaokao_network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: gaokao_alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    restart: unless-stopped
    networks:
      - gaokao_network

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: gaokao_blackbox_exporter
    ports:
      - "9115:9115"
    restart: unless-stopped
    networks:
      - gaokao_network

  # 前端界面
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: gaokao/frontend:latest
    container_name: gaokao_frontend
    ports:
      - "80:80"    # HTTP端口
      - "443:443"  # HTTPS端口
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080}
      - NODE_ENV=production
      - VITE_HOST=${FRONTEND_DOMAIN:-localhost}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL证书目录
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - gaokao_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gaokao.rule=Host(`${FRONTEND_DOMAIN:-localhost}`)"
      - "traefik.http.routers.gaokao.entrypoints=web,websecure"
      - "traefik.http.routers.gaokao.tls=true"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  logs:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local

networks:
  gaokao_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
